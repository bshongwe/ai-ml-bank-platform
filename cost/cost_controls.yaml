# Resource Quotas by Environment
#
# Enforced by cost/quota_enforcer.py

environments:
  development:
    aws:
      s3_storage_gb: 100
      lambda_invocations_per_day: 10000
      kinesis_shards: 2
    gcp:
      compute_vcpus: 8
      storage_gb: 200
      ml_training_hours_per_month: 50
    azure:
      synapse_dwu: 100
      storage_gb: 100
      query_hours_per_day: 2
    
  staging:
    aws:
      s3_storage_gb: 500
      lambda_invocations_per_day: 50000
      kinesis_shards: 4
    gcp:
      compute_vcpus: 16
      storage_gb: 500
      ml_training_hours_per_month: 200
    azure:
      synapse_dwu: 400
      storage_gb: 500
      query_hours_per_day: 8
    
  production:
    aws:
      s3_storage_gb: 5000
      lambda_invocations_per_day: 1000000
      kinesis_shards: 10
    gcp:
      compute_vcpus: 64
      storage_gb: 2000
      ml_training_hours_per_month: 1000
    azure:
      synapse_dwu: 1000
      storage_gb: 2000
      query_hours_per_day: 24

archival_policies:
  bronze_layer:
    archive_after_days: 90
    storage_class: 'GLACIER'
  
  silver_layer:
    archive_after_days: 180
    storage_class: 'GLACIER_IR'
  
  model_artifacts:
    keep_versions: 10
    archive_after_days: 365

tagging_requirements:
  required_tags:
    - environment
    - team
    - cost_center
    - project
  optional_tags:
    - owner
    - expiration_date
