apiVersion: v1
kind: Namespace
metadata:
  name: banking-ml
  labels:
    name: banking-ml
---
apiVersion: v1
kind: Secret
metadata:
  name: banking-api-secrets
  namespace: banking-ml
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "<AWS_ACCESS_KEY>"
  AWS_SECRET_ACCESS_KEY: "<AWS_SECRET_KEY>"
  AWS_REGION: "us-east-1"
---
apiVersion: v1
kind: Secret
metadata:
  name: banking-worker-secrets
  namespace: banking-ml
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "<AWS_ACCESS_KEY>"
  AWS_SECRET_ACCESS_KEY: "<AWS_SECRET_KEY>"
  AWS_REGION: "us-east-1"
  SYNAPSE_SERVER: "<SYNAPSE_SERVER>"
  SYNAPSE_DB: "analytics_warehouse"
  AZURE_CLIENT_ID: "<AZURE_CLIENT_ID>"
  AZURE_CLIENT_SECRET: "<AZURE_CLIENT_SECRET>"
  AZURE_TENANT_ID: "<AZURE_TENANT_ID>"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banking-api-ingress
  namespace: banking-ml
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.banking-ml.example.com
    secretName: banking-api-tls
  rules:
  - host: api.banking-ml.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: banking-api
            port:
              number: 443
