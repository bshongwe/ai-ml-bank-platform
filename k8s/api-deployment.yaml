apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-api
  namespace: banking-ml
  labels:
    app: banking-api
    tier: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: banking-api
  template:
    metadata:
      labels:
        app: banking-api
        tier: api
    spec:
      automountServiceAccountToken: false
      containers:
      - name: api
        image: gcr.io/banking-ml-prod/banking-api:sha-${IMAGE_TAG}
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: MODEL_REGISTRY
          value: "s3://banking-ml-models"
        envFrom:
        - secretRef:
            name: banking-api-secrets
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
            ephemeral-storage: "2Gi"
          limits:
            cpu: 2000m
            memory: 4Gi
            ephemeral-storage: "5Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: banking-api
  namespace: banking-ml
spec:
  type: LoadBalancer
  selector:
    app: banking-api
  ports:
  - port: 443
    targetPort: 8000
    protocol: TCP
    name: https
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: banking-api-hpa
  namespace: banking-ml
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: banking-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
