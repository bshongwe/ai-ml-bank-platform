name: ML Training

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM UTC
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to train'
        required: true
        type: choice
        options:
          - fraud
          - credit-risk
          - churn
          - all

jobs:
  train-model:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Configure GCP credentials
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    
    - name: Build training image
      run: |
        docker build --target worker -t banking-ml-trainer .
    
    - name: Train fraud model
      if: github.event.inputs.model == 'fraud' || github.event.inputs.model == 'all' || github.event_name == 'schedule'
      run: |
        docker run --rm \
          -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
          -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
          -e BRONZE_PATH=s3://banking-ml-bronze \
          -e SILVER_PATH=s3://banking-ml-silver \
          -e MODEL_REGISTRY=s3://banking-ml-models \
          banking-ml-trainer python main.py train fraud
    
    - name: Train credit risk model
      if: github.event.inputs.model == 'credit-risk' || github.event.inputs.model == 'all' || github.event_name == 'schedule'
      run: |
        docker run --rm \
          -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
          -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
          -e BRONZE_PATH=s3://banking-ml-bronze \
          -e SILVER_PATH=s3://banking-ml-silver \
          -e MODEL_REGISTRY=s3://banking-ml-models \
          banking-ml-trainer python main.py train credit-risk
    
    - name: Train churn model
      if: github.event.inputs.model == 'churn' || github.event.inputs.model == 'all' || github.event_name == 'schedule'
      run: |
        docker run --rm \
          -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
          -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
          -e BRONZE_PATH=s3://banking-ml-bronze \
          -e SILVER_PATH=s3://banking-ml-silver \
          -e MODEL_REGISTRY=s3://banking-ml-models \
          banking-ml-trainer python main.py train churn
    
    - name: Notify on failure
      if: failure()
      run: |
        echo "Training failed for ${{ github.event.inputs.model }}"
        # Add Slack/PagerDuty notification here
